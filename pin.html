<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clave Yape</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#720e9e">
<link rel="icon" type="image/png" href="imagen/app_icon_xxxhdpi.png">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<!-- ICONOS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- CSS -->
<link rel="stylesheet" href="cc/pin.css">
</head>

<body>

<div class="app">

  <div>
    <div class="lock">
      <i class="fa-solid fa-lock"></i>
    </div>

    <div class="title">Crear tu clave Yape</div>
    <div class="subtitle">Clave de 6 dígitos</div>

    <div class="ingresa">Ingresa tu clave Yape</div>

    <div class="puntos" id="puntos">
      <div class="punto"></div>
      <div class="punto"></div>
      <div class="punto"></div>
      <div class="punto"></div>
      <div class="punto"></div>
      <div class="punto"></div>
    </div>
  </div>

  <!-- TECLADO -->
  <div class="teclado">

    <div class="btn" onclick="agregar(1)">1</div>
    <div class="btn" onclick="agregar(2)">2</div>
    <div class="btn" onclick="agregar(3)">3</div>

    <div class="btn" onclick="agregar(4)">4</div>
    <div class="btn" onclick="agregar(5)">5</div>
    <div class="btn" onclick="agregar(6)">6</div>

    <div class="btn" onclick="agregar(7)">7</div>
    <div class="btn" onclick="agregar(8)">8</div>
    <div class="btn" onclick="agregar(9)">9</div>

    <div class="empty"></div>
    <div class="btn" onclick="agregar(0)">0</div>

    <div class="empty">
      <div class="borrar" onclick="borrar()">
        <i class="fa-solid fa-xmark"></i>
      </div>
    </div>

  </div>

</div>

<!-- MODAL -->
<div id="modalAlert" class="modal">
  <div class="modal-content">
    <p id="modalMensaje"></p>
    <div id="modalBotones" style="margin-top:15px;"></div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="app/firebase-config.js"></script>

<!-- JS -->
<script src="app/pin.js"></script>

</body>
</html>
