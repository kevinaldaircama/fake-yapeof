<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Acceso Denegado</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
    radial-gradient(circle at top left,#7c3aed 0%,transparent 30%),
    radial-gradient(circle at bottom right,#2563eb 0%,transparent 30%),
    linear-gradient(135deg,#0f172a,#111827,#020617);

    color:white;
}

.bg{
    position:fixed;
    inset:0;
    overflow:hidden;
}

.bg span{
    position:absolute;
    display:block;
    border-radius:50%;
    background:rgba(255,255,255,.05);
    animation:float 18s linear infinite;
}

.bg span:nth-child(1){
    width:180px;
    height:180px;
    left:10%;
    top:20%;
}

.bg span:nth-child(2){
    width:250px;
    height:250px;
    right:10%;
    bottom:15%;
}

.bg span:nth-child(3){
    width:120px;
    height:120px;
    left:50%;
    bottom:10%;
}

@keyframes float{
    0%{
        transform:translateY(0px) rotate(0deg);
    }
    50%{
        transform:translateY(-30px) rotate(180deg);
    }
    100%{
        transform:translateY(0px) rotate(360deg);
    }
}

.card{
    width:92%;
    max-width:520px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.1);

    border-radius:30px;

    padding:40px 30px;

    text-align:center;

    box-shadow:
    0 25px 60px rgba(0,0,0,.4);

    animation:show .7s ease;
}

@keyframes show{
    from{
        opacity:0;
        transform:translateY(20px) scale(.95);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

.icon{
    width:100px;
    height:100px;

    margin:auto;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
    linear-gradient(
        135deg,
        #ef4444,
        #dc2626
    );

    box-shadow:
    0 0 40px rgba(239,68,68,.45);

    font-size:42px;

    margin-bottom:25px;
}

.error{
    font-size:95px;
    font-weight:900;

    background:
    linear-gradient(
        135deg,
        #ffffff,
        #a855f7
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    line-height:1;
}

h1{
    margin-top:10px;
    font-size:30px;
}

p{
    margin-top:15px;
    line-height:1.7;
    color:#cbd5e1;
}

.info{
    margin-top:25px;

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.08);

    border-radius:18px;

    padding:18px;
}

.info div{
    margin:8px 0;
    font-size:14px;
}

.btns{
    display:flex;
    gap:12px;
    margin-top:25px;
}

.btn{
    flex:1;
    padding:14px;

    border:none;

    border-radius:14px;

    font-size:15px;
    font-weight:700;

    cursor:pointer;

    transition:.3s;
}

.home{
    background:
    linear-gradient(
        135deg,
        #7c3aed,
        #2563eb
    );

    color:white;
}

.back{
    background:rgba(255,255,255,.08);
    color:white;
}

.btn:hover{
    transform:translateY(-3px);
}

.footer{
    margin-top:20px;
    font-size:12px;
    opacity:.6;
}

@media(max-width:500px){

    .error{
        font-size:75px;
    }

    h1{
        font-size:24px;
    }

    .btns{
        flex-direction:column;
    }

}

</style>
</head>
<body>

<div class="bg">
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="card">

    <div class="icon">
        <i class="fas fa-lock"></i>
    </div>

    <div class="error">404</div>

    <h1>Acceso Denegado</h1>

    <p>
        No tienes permisos para acceder a esta página.
        Verifica tus credenciales o contacta con el administrador.
    </p>

    <div class="info">
        <div>🔒 Recurso protegido</div>
        <div>🛡️ Acceso restringido</div>
        <div>⚡ Error HTTP 403 Forbidden</div>
    </div>

    <div class="btns">
        <button class="btn home"
        onclick="location.href='/'">
            <i class="fas fa-home"></i>
            Inicio
        </button>

        <button class="btn back"
        onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
            Volver
        </button>
    </div>

    <div class="footer">
        © 2026 Sistema de Seguridad
    </div>

</div>

</body>
</html>
