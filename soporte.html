<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soporte de Pago</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#4a00e0,#8e2de2);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.card{
  width:90%;
  max-width:420px;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:30px;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
  animation:fade .4s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

h2{
  text-align:center;
  margin-bottom:10px;
}

.sub{
  text-align:center;
  font-size:14px;
  opacity:.8;
  margin-bottom:20px;
}

.input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  outline:none;
  font-size:14px;
}

textarea{
  resize:none;
  height:80px;
}

.file{
  margin-top:10px;
  background:rgba(255,255,255,.2);
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.preview{
  margin-top:10px;
  text-align:center;
}

.preview img{
  max-width:100%;
  border-radius:12px;
  margin-top:10px;
}

.btn{
  margin-top:20px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#25D366,#1ebe5d);
  color:white;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

.btn i{
  margin-right:8px;
}

.btn:hover{
  opacity:.9;
}

.back{
  margin-top:15px;
  text-align:center;
  font-size:14px;
  cursor:pointer;
  opacity:.8;
}

.back:hover{
  opacity:1;
}
</style>
</head>

<body>

<div class="card">

  <h2>📩 Soporte de Pago</h2>
  <div class="sub">Si pagaste y no se activó, repórtalo aquí</div>

  <input class="input" id="nombre" placeholder="Tu nombre">

  <input class="input" id="pagoId" placeholder="ID de pago">

  <textarea class="input" id="mensaje" placeholder="¿Qué pasó?"></textarea>

  <div class="file">
    <i class="fa fa-image"></i> Subir comprobante
    <input type="file" id="imagen" accept="image/*" onchange="previewImage(event)" style="display:none;">
  </div>

  <div class="preview" id="preview"></div>

  <button class="btn" onclick="enviarWhatsApp()">
    <i class="fa-brands fa-whatsapp"></i> Enviar por WhatsApp
  </button>

  <div class="back" onclick="history.back()">← Volver</div>

</div>

<script>

// abrir selector al hacer click
document.querySelector(".file").addEventListener("click", ()=>{
  document.getElementById("imagen").click();
});

function previewImage(event){
  const file = event.target.files[0];
  const reader = new FileReader();

  reader.onload = function(){
    document.getElementById("preview").innerHTML =
      `<img src="${reader.result}">`;
  }

  if(file){
    reader.readAsDataURL(file);
  }
}

function enviarWhatsApp(){

  const nombre = document.getElementById("nombre").value || "No especificado";
  const pagoId = document.getElementById("pagoId").value || "No disponible";
  const mensaje = document.getElementById("mensaje").value || "Sin mensaje";

  const texto = `
📩 *REPORTE DE PAGO*

👤 Nombre: ${nombre}
🧾 ID: ${pagoId}

📝 Mensaje:
${mensaje}

Adjunto comprobante 📸
`;

  const telefono = "51994031672"; // 🔥 TU NÚMERO

  const url = "https://wa.me/" + telefono + "?text=" + encodeURIComponent(texto);

  window.open(url, "_blank");
}

</script>

</body>
</html>
