<!DOCTYPE html>  
<html lang="es">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
  
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">  
  
<title>Yapear</title>  
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#720e9e">
<link rel="icon" type="image/png" href="imagen/app_icon_xxxhdpi.png">
  
<!-- Firebase -->  
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>  
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>  
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>  
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>  
  
<script src="app/firebase-config.js"></script>  
  
<link rel="stylesheet" href="cc/envio.css">
</head>  
  
<body>  
  
<div class="app">  
  
<div class="header">  
  <div class="icon" onclick="history.back()">←</div>  
  <div>Yapear a</div>  
  <div class="icon" onclick="history.back()">✕</div>  
</div>  
  
<div class="content">  
  
  <div id="nombre-label" class="name">Cargando...</div>  
  <div id="numero-label" class="phone"></div>  
  
  <div class="amount" onclick="document.getElementById('monto').focus()">  
    <span class="currency">S/</span>  
    <span id="monto-texto" class="monto-texto">0</span>  
    <input id="monto" value="0">  
  </div>  
  
  <div id="errorMonto" class="error">Ingresa un monto válido</div>  
  
  <div class="limit">  
    Límite por yapeo S/ 500, límite total por día S/ 2000  
  </div>  
  
  <div class="message">  
    <input id="mensaje" placeholder="Agregar Mensaje">  
  </div>  
  
</div>  
  
<div class="footer">  
  <button id="btn-bancos" class="btn-gray" disabled>OTROS BANCOS</button>  
  <button id="btn-yapear" class="btn-green" disabled>YAPEAR</button>  
</div>  
  
</div>  
  
<!-- MODAL -->  
<div id="modalSaldo" class="modal">  
  <div class="modal-content">  
    <p>Saldo insuficiente</p><br>  
    <button onclick="cerrarModalSaldo()">Cerrar</button>  
  </div>  
</div>  
  <script src="app/envio.js"></script>

</body>  
</html>
